# Server Setup
spring.application.name=mailstream
server.port=8080

# PostgreSQL Config
spring.datasource.url=jdbc:postgresql://localhost:5432/mailstream_db
spring.datasource.username=postgres 

# will be added later
spring.datasource.password=YOUR_PASSWORD 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Apache Kafka Config (Docker)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=mailstream-group
spring.kafka.consumer.auto-offset-reset=earliest

# Redis Configuration (Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mailpit Configuration (Docker)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false